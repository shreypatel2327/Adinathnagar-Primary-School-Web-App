# Spring Boot Server Config
server.port=9995
spring.application.name=school-backend

# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:schooldb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=value
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# H2 Console (for development only)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Initialize data after schema is created
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# JWT Secret (change in production)
jwt.secret=adinathnagarprimaryschoolsecretkey2024verylongsecurekeyforjwtgeneration
jwt.expiration=86400000

# CORS - Allow React frontend
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Disable security for H2 console in dev
spring.security.user.name=admin
spring.security.user.password=admin123
