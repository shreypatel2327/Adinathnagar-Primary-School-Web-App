# Spring Boot Server Config
server.port=9995
spring.application.name=school-backend

# MySQL Database Config
spring.datasource.url=jdbc:mysql://localhost:3306/schoolwebapp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.username=root
spring.datasource.password=TIGER
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Seeding configurations
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# JWT Secret (change in production)
jwt.secret=adinathnagarprimaryschoolsecretkey2024verylongsecurekeyforjwtgeneration
jwt.expiration=86400000

# CORS - Allow React frontend
spring.web.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Disable security for H2 console in dev
spring.security.user.name=admin
spring.security.user.password=admin123
