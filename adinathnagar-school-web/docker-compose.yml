version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: school-mysql
    restart: always
    environment:
      MYSQL_DATABASE: schoolwebapp
      MYSQL_ROOT_PASSWORD: TIGER
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: school-backend
    restart: always
    ports:
      - "9995:9995"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://db:3306/schoolwebapp?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=TIGER
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: school-frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mysql_data:
